<!DOCTYPE html>
<html>
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <meta name="mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <title>Sharks Way - Selfie AR</title>
    <script type="module" src="https://ajax.googleapis.com/ajax/libs/model-viewer/3.4.0/model-viewer.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/@mediapipe/camera_utils/camera_utils.js" crossorigin="anonymous"></script>
    <script src="https://cdn.jsdelivr.net/npm/@mediapipe/pose/pose.js" crossorigin="anonymous"></script>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background: #000;
            color: white;
            overflow: hidden;
            position: fixed;
            inset: 0;
            -webkit-touch-callout: none;
            -webkit-user-select: none;
            user-select: none;
        }
        #video {
            position: fixed; inset: 0;
            width: 100%; height: 100%;
            object-fit: cover; z-index: 0;
            transform: scaleX(-1);
        }
        #shark-overlay {
            position: fixed; z-index: 10;
            pointer-events: none;
            display: none;
        }
        #shark-viewer {
            background: transparent;
            --poster-color: transparent;
        }
        #pose-status {
            font-size: 10px; padding: 3px 6px; border-radius: 4px;
            background: rgba(255,80,80,0.2); border: 1px solid rgba(255,80,80,0.4);
            color: #f88; text-align: center;
        }
        #pose-status.detected {
            background: rgba(0,255,100,0.15); border-color: rgba(0,255,100,0.4); color: #0f9;
        }

        /* Top bar */
        #topbar {
            position: fixed;
            top: 0; left: 0; right: 0;
            padding: 12px 16px;
            background: linear-gradient(to bottom, rgba(0,22,26,0.75) 0%, transparent 100%);
            display: flex;
            align-items: center;
            gap: 10px;
            z-index: 9000;
        }
        #topbar a {
            color: #00A9E0;
            text-decoration: none;
            font-size: 13px;
            font-weight: 600;
        }
        #topbar h1 {
            font-size: 14px;
            font-weight: 700;
            flex: 1;
        }
        #hamburger-btn {
            background: rgba(0, 169, 224, 0.25);
            border: 1px solid rgba(0, 169, 224, 0.4);
            color: white;
            width: 36px;
            height: 36px;
            border-radius: 8px;
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            transition: all 0.3s ease;
            padding: 0;
            margin-left: auto;
            position: relative;
            z-index: 9001;
            -webkit-tap-highlight-color: transparent;
        }
        #hamburger-btn:active {
            transform: scale(0.95);
            background: rgba(0, 169, 224, 0.4);
        }
        #hamburger-btn svg {
            width: 20px;
            height: 20px;
            stroke: currentColor;
            stroke-width: 2;
            fill: none;
        }
        /* Navigation Menu */
        #nav-menu {
            position: fixed;
            top: 0;
            right: -100%;
            width: 280px;
            height: 100vh;
            background: rgba(0, 22, 26, 0.95);
            backdrop-filter: blur(20px) saturate(180%);
            -webkit-backdrop-filter: blur(20px) saturate(180%);
            border-left: 1px solid rgba(0, 169, 224, 0.3);
            z-index: 9050;
            transition: right 0.3s ease;
            padding: 60px 20px 20px;
            overflow-y: auto;
        }
        #nav-menu.open {
            right: 0;
        }
        #nav-menu .close-btn {
            position: absolute;
            top: 12px;
            right: 12px;
            background: rgba(0, 169, 224, 0.25);
            border: 1px solid rgba(0, 169, 224, 0.4);
            color: white;
            width: 36px;
            height: 36px;
            border-radius: 8px;
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            font-size: 24px;
            line-height: 1;
            -webkit-tap-highlight-color: transparent;
            padding: 0;
        }
        #nav-menu h2 {
            color: #00A9E0;
            font-size: 18px;
            margin-bottom: 20px;
            font-weight: 700;
        }
        #nav-menu .nav-link {
            display: flex;
            align-items: center;
            gap: 12px;
            padding: 14px 16px;
            margin-bottom: 8px;
            background: rgba(0, 169, 224, 0.1);
            border: 1px solid rgba(0, 169, 224, 0.2);
            border-radius: 12px;
            color: white;
            text-decoration: none;
            font-size: 14px;
            font-weight: 600;
            transition: all 0.3s ease;
        }
        #nav-menu .nav-link:hover,
        #nav-menu .nav-link:active {
            background: rgba(0, 169, 224, 0.25);
            border-color: rgba(0, 169, 224, 0.4);
            transform: translateX(-4px);
        }
        #nav-menu .nav-link svg {
            width: 20px;
            height: 20px;
            stroke: #00A9E0;
            stroke-width: 2;
            fill: none;
        }
        #nav-overlay {
            position: fixed;
            inset: 0;
            background: rgba(0, 0, 0, 0.5);
            z-index: 9040;
            opacity: 0;
            pointer-events: none;
            transition: opacity 0.3s ease;
        }
        #nav-overlay.visible {
            opacity: 1;
            pointer-events: auto;
        }
        @media (max-width: 480px) {
            #nav-menu {
                width: 85%;
                max-width: 320px;
            }
        }

        /* DEV panel */
        #dev-panel {
            position: fixed;
            top: 60px;
            right: 12px;
            z-index: 9999;
            background: rgba(0,0,0,0.75);
            backdrop-filter: blur(8px);
            border-radius: 12px;
            padding: 10px 14px;
            display: flex;
            flex-direction: column;
            gap: 8px;
            font-family: monospace;
            font-size: 13px;
            color: #0ff;
            border: 1px solid rgba(0,255,255,0.3);
        }
        #dev-panel select {
            background: #111;
            color: #0ff;
            border: 1px solid #0ff;
            border-radius: 6px;
            padding: 4px 8px;
            font-family: monospace;
            font-size: 12px;
            cursor: pointer;
            outline: none;
        }
        #dev-panel label {
            font-size: 10px;
            opacity: 0.6;
        }
        #dev-panel input[type=range] {
            width: 100%;
            accent-color: #0ff;
        }

        /* Bottom controls */
        #selfie-controls {
            position: fixed;
            bottom: 36px;
            left: 50%;
            transform: translateX(-50%);
            z-index: 9000;
            display: flex;
            align-items: center;
            gap: 20px;
        }
        #selfie-snap {
            width: 72px;
            height: 72px;
            border-radius: 50%;
            background: white;
            border: 5px solid rgba(0,169,224,0.9);
            box-shadow: 0 0 0 3px rgba(0,169,224,0.3), 0 8px 24px rgba(0,0,0,0.5);
            cursor: pointer;
            transition: transform 0.12s ease;
            flex-shrink: 0;
        }
        #selfie-snap:active { transform: scale(0.88); }
        #selfie-hint {
            position: fixed;
            bottom: 130px;
            left: 50%;
            transform: translateX(-50%);
            background: rgba(0,0,0,0.5);
            backdrop-filter: blur(8px);
            border: 1px solid rgba(0,169,224,0.3);
            border-radius: 20px;
            padding: 8px 18px;
            font-size: 12px;
            color: rgba(255,255,255,0.8);
            z-index: 9000;
            white-space: nowrap;
            transition: opacity 0.5s ease;
        }

        /* Progress tracker (checkpoint tracker) */
        #progress-tracker {
            position: fixed;
            bottom: 20px;
            left: 20px;
            background: rgba(0, 109, 117, 0.15);
            backdrop-filter: blur(20px) saturate(180%);
            -webkit-backdrop-filter: blur(20px) saturate(180%);
            padding: 16px 18px;
            border-radius: 16px;
            color: white;
            font-size: 11px;
            z-index: 100;
            border: 1px solid rgba(0, 169, 224, 0.3);
            box-shadow: 0 8px 32px rgba(0, 109, 117, 0.4),
                        inset 0 1px 0 rgba(255, 255, 255, 0.2);
            max-width: 160px;
        }
        #progress-tracker .stop-item {
            margin: 6px 0;
            opacity: 0.5;
            display: flex;
            align-items: center;
            gap: 6px;
            transition: all 0.3s ease;
        }
        #progress-tracker .stop-item.visited {
            opacity: 1;
            color: #00A9E0;
        }
        #progress-tracker .stop-item.visited .check-icon circle {
            fill: #00A9E0;
            stroke: #00A9E0;
        }
        #progress-tracker .stop-item.visited .check-icon path {
            stroke: white;
            fill: none;
            stroke-width: 2;
        }
        #progress-tracker .stop-item.active {
            opacity: 1;
            color: #00A9E0;
            font-weight: bold;
        }
        #progress-tracker .stop-item .check-icon {
            width: 14px;
            height: 14px;
            stroke: currentColor;
            stroke-width: 2.5;
            fill: none;
        }
        @media (max-width: 480px) {
            #progress-tracker {
                bottom: 10px;
                left: 10px;
                max-width: 140px;
                padding: 12px 14px;
                font-size: 10px;
            }
        }

        /* Flash */
        #selfie-flash {
            position: fixed;
            inset: 0;
            background: white;
            z-index: 99999;
            opacity: 0;
            pointer-events: none;
            transition: opacity 0.05s ease;
        }

        /* Preview overlay */
        #selfie-preview {
            display: none;
            position: fixed;
            inset: 0;
            z-index: 99998;
            background: rgba(0,0,0,0.88);
            align-items: center;
            justify-content: center;
            flex-direction: column;
            gap: 20px;
        }
        #selfie-preview.active { display: flex; }
        #selfie-preview img {
            max-width: 92vw;
            max-height: 68vh;
            border-radius: 18px;
            border: 2px solid rgba(0,169,224,0.5);
            box-shadow: 0 8px 48px rgba(0,0,0,0.7);
        }
        #selfie-preview-label {
            font-size: 13px;
            color: rgba(255,255,255,0.6);
            letter-spacing: 0.3px;
        }
        #selfie-preview-actions {
            display: flex;
            gap: 12px;
            width: 100%;
            max-width: 400px;
        }
        #selfie-preview-actions button {
            flex: 1;
            padding: 16px 20px;
            border-radius: 12px;
            font-size: 15px;
            font-weight: 600;
            cursor: pointer;
            border: none;
            transition: all 0.2s ease;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 8px;
            box-shadow: 0 2px 8px rgba(0,0,0,0.15);
        }
        #selfie-preview-actions button:active { 
            transform: translateY(1px);
            box-shadow: 0 1px 4px rgba(0,0,0,0.2);
        }
        #btn-retake { 
            background: rgba(255,255,255,0.15);
            color: white;
            border: 1.5px solid rgba(255,255,255,0.3) !important;
            backdrop-filter: blur(10px);
        }
        #btn-retake:hover { background: rgba(255,255,255,0.2); }
        #btn-save { 
            background: #00A9E0;
            color: white;
        }
        #btn-save:hover { background: #008FC7; }
        #btn-share { 
            background: rgba(0,169,224,0.2);
            color: #00A9E0;
            border: 1.5px solid rgba(0,169,224,0.5) !important;
            backdrop-filter: blur(10px);
        }
        #btn-share:hover { background: rgba(0,169,224,0.3); }

        /* Loading */
        #selfie-loading {
            position: fixed;
            inset: 0;
            background: rgba(0,15,20,0.95);
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            z-index: 8000;
            gap: 16px;
            transition: opacity 0.4s ease;
        }
        #selfie-loading.hidden { opacity: 0; pointer-events: none; }
        .spinner {
            width: 44px; height: 44px;
            border: 3px solid rgba(0,169,224,0.2);
            border-top-color: #00A9E0;
            border-radius: 50%;
            animation: spin 0.8s linear infinite;
        }
        @keyframes spin { to { transform: rotate(360deg); } }
        #selfie-loading p { font-size: 13px; color: rgba(255,255,255,0.6); }
        #selfie-loading h2 { font-size: 16px; color: #00A9E0; }
    </style>
</head>
<body>

    <!-- Camera feed -->
    <video id="video" autoplay playsinline muted></video>

    <!-- Shark overlay positioned at shoulder by JS -->
    <div id="shark-overlay">
        <model-viewer id="shark-viewer"
            src="./assets/3D-models/Pose_sharky_02.glb"

            min-field-of-view="40deg"
            max-field-of-view="90deg"
            disable-zoom interaction-prompt="none"
            environment-image="neutral" shadow-intensity="0"
            style="width:300px;height:300px;background:transparent;--poster-color:transparent;">
        </model-viewer>
    </div>

    <!-- Loading -->

        <div class="spinner"></div>
        <h2>🦈 Selfie AR</h2>
        <p id="loading-msg">Starting body tracking...</p>
    </div>

    <!-- Top bar -->
    <div id="topbar">
        <a href="./index.html">&larr;</a>
        <h1>Selfie AR</h1>
        <button id="hamburger-btn">
            <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24">
                <line x1="3" y1="6" x2="21" y2="6"/>
                <line x1="3" y1="12" x2="21" y2="12"/>
                <line x1="3" y1="18" x2="21" y2="18"/>
            </svg>
        </button>
    </div>

    <!-- Navigation Menu -->
    <div id="nav-overlay"></div>
    <div id="nav-menu">
        <button class="close-btn" id="close-menu">&times;</button>
        <h2>Navigation</h2>
        <a href="./sharks-way.html" class="nav-link">
            <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24">
                <path d="M21 10c0 7-9 13-9 13s-9-6-9-13a9 9 0 0 1 18 0z"/>
                <circle cx="12" cy="10" r="3"/>

        </a>
        <a href="./location-tour.html" class="nav-link">

        </a>

                <circle cx="12" cy="13" r="4"/>
            </svg>
            Selfie AR
        </a>
    </div>

    <!-- Progress tracker (checkpoint tracker) -->
    <div id="progress-tracker">
        <div style="font-weight: bold; margin-bottom: 10px; display: flex; align-items: center; gap: 6px;">
            <svg class="icon" xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" style="width: 14px; height: 14px; stroke: currentColor; stroke-width: 2; fill: none;"><circle cx="12" cy="12" r="10"/><path d="m9 12 2 2 4-4"/></svg>

        </div>
        <div class="stop-item" data-checkpoint="A" id="checkpoint-a">
            <svg class="check-icon" xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24"><circle cx="12" cy="12" r="10"></circle><path d="m9 12 2 2 4-4"></path></svg>

        </div>
        <div class="stop-item" data-checkpoint="B" id="checkpoint-b">
            <svg class="check-icon" xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24"><circle cx="12" cy="12" r="10"></circle><path d="m9 12 2 2 4-4"></path></svg>
            Label B
        </div>
    </div>

    <!-- DEV panel -->
    <div id="dev-panel" style="display: none;">
        <span style="font-size:10px;opacity:0.6;">🛠 DEV MODEL</span>
        <select id="glb-select">
            <option value="./assets/3D-models/plushie_shark.glb">plushie_shark</option>
            <option value="./assets/3D-models/MARIA_SHARK.glb">MARIA_SHARK</option>
            <option value="./assets/3D-models/MARIA_SHARK_ANIMATED.glb">MARIA_SHARK_ANIMATED</option>
            <option value="./assets/3D-models/SHAUN_SHARK.glb">SHAUN_SHARK</option>
            <option value="./assets/3D-models/SHAUN_SHARK_ANIMATED.glb">SHAUN_SHARK_ANIMATED</option>
            <option value="./assets/3D-models/STELLA_CAI_SHARK_SJSU_TEST1.glb">STELLA_CAI_SHARK</option>
            <option value="./assets/3D-models/mock_up_eoe_map.glb">mock_up_eoe_map</option>
            <option value="./assets/3D-models/Pose_sharky_01.glb">Pose_sharky_01</option>
            <option value="./assets/3D-models/Pose_sharky_01._no_glass.glb">Pose_sharky_01_no_glass</option>
            <option value="./assets/3D-models/Pose_sharky_02.glb" selected>Pose_sharky_02</option>
        </select>

        <select id="anchor-select">
            <option value="left">Left shoulder</option>
            <option value="right">Right shoulder</option>
            <option value="mid" selected>Between shoulders</option>
        </select>
        <label>Size: <span id="size-val">300</span>px</label>
        <input type="range" id="size-slider" min="80" max="700" step="10" value="300">

    <div id="selfie-hint">🦈 Step back so your shoulders are visible</div>

    <div id="selfie-controls">
        <button id="selfie-snap"></button>
    </div>

    <div id="selfie-flash"></div>

    <div id="selfie-preview">
        <div id="selfie-preview-label">Your Sharks Way Selfie 🦈</div>
        <img id="selfie-preview-img" src="" alt="Selfie">
        <div id="selfie-preview-actions">
            <button id="btn-retake">
                <svg xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                    <path d="M3 12a9 9 0 0 1 9-9 9.75 9.75 0 0 1 6.74 2.74L21 8"/>
                    <path d="M21 3v5h-5"/>
                    <path d="M21 12a9 9 0 0 1-9 9 9.75 9.75 0 0 1-6.74-2.74L3 16"/>
                    <path d="M3 21v-5h5"/>

                Retake
            </button>
            <button id="btn-save">
                <svg xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                    <path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/>
                    <polyline points="7 10 12 15 17 10"/>
                    <line x1="12" y1="15" x2="12" y2="3"/>
                </svg>
                Save
            </button>
            <button id="btn-share">
                <svg xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                    <circle cx="18" cy="5" r="3"/>
                    <circle cx="6" cy="12" r="3"/>
                    <circle cx="18" cy="19" r="3"/>
                    <line x1="8.59" y1="13.51" x2="15.42" y2="17.49"/>
                    <line x1="15.41" y1="6.51" x2="8.59" y2="10.49"/>
                </svg>
                Share
            </button>
        </div>
    </div>

    <script>
        var video = document.getElementById('video');
        var overlay = document.getElementById('shark-overlay');
        var viewer = document.getElementById('shark-viewer');
        var poseStatus = document.getElementById('pose-status');
        var DEV = { anchor: 'right', size: 210, yNudge: -70 };
        var lastPos = null;

        // ─── CAMERA ───
        navigator.mediaDevices.getUserMedia({
            video: { facingMode: 'user', width: { ideal: 1280 }, height: { ideal: 720 } },
            audio: false
        }).then(function(stream) {
            video.srcObject = stream;
            video.play();
            initPose();
        }).catch(function(e) {
            document.getElementById('loading-msg').textContent = 'Camera error: ' + e.message;
        });

        // ─── MEDIAPIPE POSE ───
        function initPose() {
            document.getElementById('loading-msg').textContent = 'Loading pose model...';
            var pose = new Pose({
                locateFile: function(f) {
                    return 'https://cdn.jsdelivr.net/npm/@mediapipe/pose/' + f;
                }
            });
            pose.setOptions({
                modelComplexity: 1,
                smoothLandmarks: true,
                enableSegmentation: false,
                minDetectionConfidence: 0.5,
                minTrackingConfidence: 0.5
            });
            pose.onResults(onResults);

            var camera = new Camera(video, {
                onFrame: async function() {
                    await pose.send({ image: video });
                },
                width: 1280, height: 720
            });
            camera.start().then(function() {
                document.getElementById('selfie-loading').classList.add('hidden');
                setTimeout(function() {
                    document.getElementById('selfie-hint').style.opacity = '0';
                }, 5000);
            });
        }

        // ─── POSE RESULTS ───
        // MediaPipe Pose landmarks: 11 = left shoulder, 12 = right shoulder
        // Coords are normalized 0-1. Video is mirrored so we flip X.
        function onResults(results) {
            if (!results.poseLandmarks) {
                poseStatus.textContent = 'No pose detected';
                poseStatus.classList.remove('detected');
                overlay.style.display = 'none';
                return;
            }
            var lm = results.poseLandmarks;
            var leftShoulder  = lm[11]; // x,y normalized
            var rightShoulder = lm[12];

            if (!leftShoulder || !rightShoulder) return;

            var W = window.innerWidth;
            var H = window.innerHeight;
            var half = DEV.size / 2;

            // Video is mirrored via CSS scaleX(-1), so flip X
            var lx = (1 - leftShoulder.x)  * W;
            var ly = leftShoulder.y  * H;
            var rx = (1 - rightShoulder.x) * W;
            var ry = rightShoulder.y * H;

            var px, py;
            if (DEV.anchor === 'left')       { px = lx - 30; py = ly; }
            else if (DEV.anchor === 'right') { px = rx + 90; py = ry; }
            else                             { px = (lx + rx) / 2; py = (ly + ry) / 2; }

            py += DEV.yNudge;

            // Clamp so the full shark always stays within viewport
            var clampedX = Math.min(Math.max(px - half, 0), W - DEV.size);
            var clampedY = Math.min(Math.max(py - half, 0), H - DEV.size);

            overlay.style.left    = clampedX + 'px';
            overlay.style.top     = clampedY + 'px';
            overlay.style.display = 'block';
            viewer.style.width    = DEV.size + 'px';
            viewer.style.height   = DEV.size + 'px';

            poseStatus.textContent = '✓ Shoulders detected';
            poseStatus.classList.add('detected');
            lastPos = { px: clampedX + half, py: clampedY + half };
        }

        // ─── DEV CONTROLS ───
        document.getElementById('glb-select').addEventListener('change', function() {
            viewer.setAttribute('src', this.value);
        });
        document.getElementById('anchor-select').addEventListener('change', function() {
            DEV.anchor = this.value;
        });
        document.getElementById('size-slider').addEventListener('input', function() {
            DEV.size = parseInt(this.value);
            document.getElementById('size-val').textContent = DEV.size;
            viewer.style.width  = DEV.size + 'px';
            viewer.style.height = DEV.size + 'px';
        });
        document.getElementById('y-nudge').addEventListener('input', function() {
            DEV.yNudge = parseInt(this.value);
            document.getElementById('y-nudge-val').textContent = DEV.yNudge;
        });

        // ─── SNAP ───
        document.getElementById('selfie-snap').addEventListener('click', function() {
            var flash = document.getElementById('selfie-flash');
            flash.style.opacity = '1';
            setTimeout(function() {
                flash.style.transition = 'opacity 0.35s ease';
                flash.style.opacity = '0';
                setTimeout(function() { flash.style.transition = ''; }, 400);
            }, 60);

            // Composite: draw video frame + model-viewer canvas onto output canvas
            var out = document.createElement('canvas');
            out.width  = video.videoWidth;
            out.height = video.videoHeight;
            var ctx = out.getContext('2d');
            
            // Calculate scale factors
            var scaleX = video.videoWidth / window.innerWidth;
            var scaleY = video.videoHeight / window.innerHeight;

            // Draw video (not mirrored)
            ctx.drawImage(video, 0, 0, out.width, out.height);

            // Draw model-viewer on top at shoulder position
            if (lastPos) {
                var mvCanvas = viewer.shadowRoot ? viewer.shadowRoot.querySelector('canvas') : null;
                if (mvCanvas) {
                    // Use position directly
                    var x = (lastPos.px - DEV.size / 2) * scaleX;
                    var y = (lastPos.py - DEV.size / 2) * scaleY;
                    var sharkWidth = DEV.size * scaleX;
                    var sharkHeight = DEV.size * scaleY;
                    ctx.drawImage(mvCanvas, x, y, sharkWidth, sharkHeight);
                }
            }

            document.getElementById('selfie-preview-img').src = out.toDataURL('image/png');
            document.getElementById('selfie-preview').classList.add('active');
        });

        // ─── PREVIEW ACTIONS ───
        document.getElementById('btn-retake').addEventListener('click', function() {
            document.getElementById('selfie-preview').classList.remove('active');
        });
        document.getElementById('btn-save').addEventListener('click', function() {
            var a = document.createElement('a');
            a.href = document.getElementById('selfie-preview-img').src;
            a.download = 'sharks-way-selfie-' + Date.now() + '.png';
            a.click();
            document.getElementById('selfie-preview').classList.remove('active');
        });
        document.getElementById('btn-share').addEventListener('click', function() {
            var imgSrc = document.getElementById('selfie-preview-img').src;
            if (navigator.share) {
                fetch(imgSrc).then(function(r) { return r.blob(); }).then(function(blob) {
                    navigator.share({ files: [new File([blob], 'sharks-way-selfie.png', { type: 'image/png' })] });
                });
            } else {
                navigator.clipboard.writeText('Check out my Sharks Way selfie! 🦈')
                    .then(function() { alert('Caption copied!'); });
            }
        });

        // Navigation Menu
        const navMenu = document.getElementById('nav-menu');
        const navOverlay = document.getElementById('nav-overlay');
        const hamburgerBtn = document.getElementById('hamburger-btn');
        const closeMenuBtn = document.getElementById('close-menu');

        function openMenu() {
            navMenu.classList.add('open');
            navOverlay.classList.add('visible');
        }

        function closeMenu() {
            navMenu.classList.remove('open');
            navOverlay.classList.remove('visible');
        }

        hamburgerBtn.addEventListener('click', openMenu);
        hamburgerBtn.addEventListener('touchend', function(e) {
            e.preventDefault();
            openMenu();
        });
        
        closeMenuBtn.addEventListener('click', closeMenu);
        closeMenuBtn.addEventListener('touchend', function(e) {
            e.preventDefault();
            closeMenu();
        });
        
        navOverlay.addEventListener('click', closeMenu);
        navOverlay.addEventListener('touchend', function(e) {
            e.preventDefault();
            closeMenu();
        });

        document.addEventListener('keydown', function(e) {
            if (e.key === 'Escape' && navMenu.classList.contains('open')) {
                closeMenu();
            }
        });
    </script>

    <!-- GPS Tracking for Checkpoints -->
    <script src="./JS/shared-gps-tracking.js"></script>
</body>
</html>
